name: Build and Release

on:
  push:
    branches:
      - master
    tags:
      - '*'
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update. Leave empty to only build artifacts.
        required: false
        type: string
      prerelease:
        description: Mark the GitHub release as a prerelease when creating it.
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build all loaders
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build jars
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon :ModernUI-Fabric:build :ModernUI-Forge:build :ModernUI-NeoForge:build

      - name: Collect release jars
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          cp fabric/build/libs/*-universal.jar release/
          cp forge/build/libs/*-universal.jar release/
          cp neoforge/build/libs/*-universal.jar release/
          ls -lh release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: modernui-mc-release-jars
          path: release/*.jar
          if-no-files-found: error

      - name: Resolve release tag
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          tag=""
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          elif [[ -n "${INPUT_TAG}" ]]; then
            tag="${INPUT_TAG}"
          fi

          if [[ -n "${tag}" ]]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
            echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "tag=" >> "${GITHUB_OUTPUT}"
          fi

      - name: Create or update GitHub release
        if: steps.release.outputs.enabled == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          PRERELEASE: ${{ github.event.inputs.prerelease }}
        run: |
          set -euo pipefail
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" release/*.jar --clobber
          else
            prerelease_arg=()
            if [[ "${PRERELEASE}" == "true" ]]; then
              prerelease_arg=(--prerelease)
            fi
            gh release create "${RELEASE_TAG}" release/*.jar \
              --title "${RELEASE_TAG}" \
              --target "${GITHUB_SHA}" \
              --generate-notes \
              "${prerelease_arg[@]}"
          fi
